version: '3.8'

services:
  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: supplement-dashboard-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DATABASE_PATH=/app/database/customers.db
      - FRONTEND_URL=http://localhost:3001
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - backend_node_modules:/app/node_modules
    depends_on:
      - redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Frontend React app
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: supplement-dashboard-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: supplement-dashboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  backend_node_modules:
  redis_data:

networks:
  app-network:
    driver: bridge
